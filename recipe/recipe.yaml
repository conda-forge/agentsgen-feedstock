schema_version: 1

context:
  version: "0.3.0"
  python_min: "3.11"

package:
  name: agentsgen
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/agentsgen/agentsgen-${{ version }}.tar.gz
  sha256: 727cdefa665502690c20043328663a0249ffef0288d930b4a0259a8039929952

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - agentsgen = agentsgen.cli:main
      - agents = agentsgen.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }}
    - typer >=0.12,<1.0
    - rich >=13,<14

tests:
  - python:
      imports:
        - agentsgen
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - agentsgen --help
      - agents --help

about:
  summary: Generate and safely update AGENTS.md and RUNBOOK.md for coding agents
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/markoblogo/AGENTS.md_generator
  repository: https://github.com/markoblogo/AGENTS.md_generator
  documentation: https://agentsmd.abvx.xyz/

extra:
  recipe-maintainers:
    - markoblogo
